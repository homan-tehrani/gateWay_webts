image:
  name: docker:latest
  entrypoint: ["/bin/sh", "-c"]

services:
  - name: docker:dind
    alias: docker

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  COMPLETE_URL: $DOCKER_REG/app12/gateway:$CI_COMMIT_TAG
  REG_APP_NAME: gateway
  SCOPE: app12
stages:
  - build
  - deploy

build:
  stage: build
  before_script:
    - docker info
    - echo $DOCKER_REG_PASS | docker login $DOCKER_REG --username $DOCKER_REG_USER --password-stdin
  script:
    - echo "Build And Push"
    - export DOCKER_DEFAULT_PLATFORM=linux/amd64
    - docker build . -t $DOCKER_REG/app12/$REG_APP_NAME:$CI_COMMIT_TAG
    - echo $CI_REGISTRY
    - docker push $DOCKER_REG/app12/$REG_APP_NAME:$CI_COMMIT_TAG
  only:
    - tags
  tags:
    - build

deploy:
  stage: deploy
  image:
    name: reg.masafiranian.ir/localkubectl:1.0.0
  script:
    - echo deploy = $COMPLETE_URL
    - kubectl set image -n $SCOPE deployment/$REG_APP_NAME $REG_APP_NAME=$COMPLETE_URL --insecure-skip-tls-verify && kubectl set env -n $SCOPE deployment/$REG_APP_NAME APP_VERSION=$CI_COMMIT_TAG --insecure-skip-tls-verify
  only:
    - tags
  needs:
    - build
  tags:
    - deploy
  when: manual
