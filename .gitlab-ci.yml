image:
  name: docker:latest
  entrypoint: ["/bin/sh", "-c"]

services:
  - name: docker:dind
    alias: docker

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  SCOPE: webts

stages:
  - build
  - deploy-ganjineh
  - deploy-front
  - deploy-basynergy

# ==================== BUILD (فقط با تگ) ====================
build:
  stage: build
  before_script:
    - docker info
    - echo "$DOCKER_REG_PASS" | docker login "$DOCKER_REG" --username "$DOCKER_REG_USER" --password-stdin
  script:
    - echo "Build And Push"
    - export DOCKER_DEFAULT_PLATFORM=linux/amd64
    - IMAGE_TAG="$CI_COMMIT_TAG"
    - docker build . -t "$DOCKER_REG/$SCOPE/$CI_PROJECT_NAME:$IMAGE_TAG"
    - docker push "$DOCKER_REG/$SCOPE/$CI_PROJECT_NAME:$IMAGE_TAG"
    - echo "IMAGE_TAG=$IMAGE_TAG" > variables.env
  artifacts:
    reports:
      dotenv: variables.env
  only:
    - tags
  tags:
    - build

# ==================== DEPLOY GANJINEH ====================
deploy-ganjineh:
  stage: deploy-ganjineh
  when: manual
  script:
    - SSH_USER="$GANJINEH_SSH_USER"
    - VM_IPADDRESS="$GANJINEH_VM_IPADDRESS"
    - PATH_RUN="$GANJINEH_PATH_RUN"
    - SSH_PRIVATE_KEY="$GANJINEH_SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -T 10 -H "$VM_IPADDRESS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_rsa
    - ssh -A "$SSH_USER@$VM_IPADDRESS" "mkdir -p $PATH_RUN/$CI_PROJECT_NAME"
    - scp ./docker-compose.yml "$SSH_USER@$VM_IPADDRESS:$PATH_RUN/$CI_PROJECT_NAME/"
    - scp ./run-production.sh "$SSH_USER@$VM_IPADDRESS:$PATH_RUN/$CI_PROJECT_NAME/"  # کپی فایل استاتیک
    - ssh -A "$SSH_USER@$VM_IPADDRESS" "chmod +x $PATH_RUN/$CI_PROJECT_NAME/run-production.sh"
    - printf '%s' "$DOCKER_REG_PASS" | ssh -A "$SSH_USER@$VM_IPADDRESS" "docker login $DOCKER_REG --username $DOCKER_REG_USER --password-stdin"
    - |
      ssh -o ServerAliveInterval=30 -A "$SSH_USER@$VM_IPADDRESS" "
        cd '$PATH_RUN/$CI_PROJECT_NAME'
        export IMAGE_TAG='$IMAGE_TAG'
        export CI_PROJECT_NAME='$CI_PROJECT_NAME'
        export DOCKER_REG='$DOCKER_REG'
        export CI_PROJECT_NAMESPACE='$SCOPE'
        export DOCKER_REG_USER='$DOCKER_REG_USER'
        export DOCKER_REG_PASS='$DOCKER_REG_PASS'
        ./run-production.sh
      "
    - echo "Deployed to Ganjineh successfully!"
  only:
    - tags
  needs:
    - build
  tags:
    - deploy

