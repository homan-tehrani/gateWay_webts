    - scp ./docker-compose.yml "$SSH_USER@$VM_IPADDRESS:$PATH_RUN/$CI_PROJECT_NAME/"
    - scp ./run-production.sh "$SSH_USER@$VM_IPADDRESS:$PATH_RUN/$CI_PROJECT_NAME/"  # کپی فایل استاتیک
    - ssh -A "$SSH_USER@$VM_IPADDRESS" "chmod +x $PATH_RUN/$CI_PROJECT_NAME/run-production.sh"
    - printf '%s' "$DOCKER_REG_PASS" | ssh -A "$SSH_USER@$VM_IPADDRESS" "docker login $DOCKER_REG --username $DOCKER_REG_USER --password-stdin"
    - |
      ssh -o ServerAliveInterval=30 -A "$SSH_USER@$VM_IPADDRESS" "
        cd '$PATH_RUN/$CI_PROJECT_NAME'
        export IMAGE_TAG='$IMAGE_TAG'
        export CI_PROJECT_NAME='$CI_PROJECT_NAME'
        export DOCKER_REG='$DOCKER_REG'
